name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-node:
    name: Lint Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api lint || true  # eslint config not strictly enforced in Phase 1

  typecheck-node:
    name: Typecheck Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api typecheck
      - run: pnpm --filter web typecheck

  test-node:
    name: Test Node
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smart_inv
          POSTGRES_PASSWORD: smart_inv
          POSTGRES_DB: smart_inv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smart_inv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smart_inv:smart_inv@localhost:5432/smart_inv_test
      JWT_SECRET: ci-test-secret-32chars-padding-pad
      JWT_EXPIRES_IN: 1h
      BCRYPT_ROUNDS: "4"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:migrate
      - run: pnpm --filter api test

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12.2
      - run: pip install -e ".[dev]"
      - run: ruff check .

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12.2
      - run: pip install -e ".[dev]"
      - run: pytest

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f apps/api/Dockerfile -t smart-inv-api:ci .
      - run: docker build -f apps/ml/Dockerfile -t smart-inv-ml:ci ./apps/ml
