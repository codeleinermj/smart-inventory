services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-inv-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_inv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_inv}
      POSTGRES_DB: ${POSTGRES_DB:-smart_inv}
    ports:
      # Host 5433 -> container 5432 (avoids conflict with other local Postgres instances)
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_inv -d smart_inv"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-inv-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smart-inv-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-smart_inv}:${POSTGRES_PASSWORD:-smart_inv}@postgres:5432/${POSTGRES_DB:-smart_inv}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — copy .env.example to .env and set a real value}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ml:
    build:
      context: ./apps/ml
      dockerfile: Dockerfile
    container_name: smart-inv-ml
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: smart-inv-postgres-data
